name: audit
# GoReleaser writes this tap's casks; their formatting can't satisfy homebrew-core's `brew
# style` layout cops, which is irrelevant for a personal tap. We run the meaningful check —
# `brew audit` — against the published cask instead.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Audit cask
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew tap rnwolfe/homebrew-tap
          brew audit --cask --except=installed rnwolfe/homebrew-tap/rivr