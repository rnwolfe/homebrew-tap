name: audit
# GoReleaser writes this tap's casks; their formatting can't satisfy homebrew-core's `brew
# style` layout cops (multi-line verified url + hook block), which is irrelevant for a
# personal tap. We run the meaningful check — `brew audit` — instead.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Audit cask
        run: |
          brew tap rnwolfe/homebrew-tap "$GITHUB_WORKSPACE"
          brew audit --cask --except=installed rnwolfe/homebrew-tap/rivr