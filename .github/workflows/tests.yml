name: audit
# GoReleaser writes rivr's formula here; run the meaningful check (brew audit) on push.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Audit rivr formula
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew tap rnwolfe/homebrew-tap
          brew audit --formula --except=installed rnwolfe/homebrew-tap/rivr